name: Repository Hygiene

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  hygiene:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Repository hygiene
      run: python tools/check_repo_hygiene.py
