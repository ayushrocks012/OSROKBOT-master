name: Windows QA

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  qa:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: python -m pip install -r requirements.txt
    - name: Compile
      run: python -m compileall Classes verify_integrity.py verify_docs.py cleanup_media.py watchdog.py tools/check_repo_hygiene.py
    - name: Ruff
      run: python -m ruff check Classes verify_integrity.py verify_docs.py cleanup_media.py watchdog.py tools/check_repo_hygiene.py --select I,UP,RET,SIM,B,F,PTH
    - name: Mypy
      run: python -m mypy
    - name: Bandit
      run: python -m bandit -q -r Classes watchdog.py verify_integrity.py verify_docs.py cleanup_media.py tools/check_repo_hygiene.py -ll -ii
    - name: Radon
      run: python -m radon cc -n C -s Classes
    - name: Vulture
      run: python -m vulture Classes tests verify_integrity.py watchdog.py cleanup_media.py tools/check_repo_hygiene.py --exclude Media/,data/,datasets/,diagnostics/,models/ --min-confidence 80
    - name: Verify docs
      run: python verify_docs.py
    - name: Pytest
      run: python -m pytest -m "not supervised" --basetemp .pytest_tmp_ci -o cache_dir=.pytest_cache_ci
