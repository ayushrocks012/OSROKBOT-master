[tool.ruff]
target-version = "py313"
line-length = 120
extend-exclude = [
    "Media",
    "Media/Legacy",
    "Classes/Actions/legacy",
    "data",
    "datasets",
    "diagnostics",
    "models",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "ANN", "PTH", "RET"]
ignore = [
    "E501",  # Existing UI/status strings are often easier to read as one line.
    "E402",  # This project uses script-style entrypoints with local path setup.
    "ANN401",  # Context and PyQt payloads intentionally carry dynamic data.
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.per-file-ignores]
"Classes/input_controller.py" = [
    "SIM103",  # Keep explicit pause/stop guard branches around hardware input.
    "SIM105",  # Keep defensive release paths obvious in low-level input cleanup.
]

[tool.mypy]
python_version = "3.13"
strict = true
mypy_path = ["Classes"]
ignore_missing_imports = true
explicit_package_bases = true
follow_imports = "skip"
files = [
    "Classes/runtime_contracts.py",
    "Classes/runtime_payloads.py",
    "Classes/context.py",
    "Classes/OS_ROKBOT.py",
    "Classes/action_sets.py",
    "Classes/ai_recovery_executor.py",
]
exclude = [
    "Media/",
    "Classes/Actions/legacy/",
    "data/",
    "datasets/",
    "diagnostics/",
    "models/",
]

[tool.vulture]
paths = ["Classes", "verify_integrity.py", "watchdog.py", "cleanup_media.py"]
exclude = ["Media/", "Classes/Actions/legacy/", "data/", "datasets/", "diagnostics/", "models/"]
min_confidence = 80
sort_by_size = true
