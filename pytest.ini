[pytest]
testpaths = tests
pythonpath = Classes
addopts =
    -q
    --strict-markers
    --cov=ai_fallback
    --cov=ai_recovery_executor
    --cov=config_manager
    --cov=context
    --cov=dynamic_planner
    --cov=model_manager
    --cov=OS_ROKBOT
    --cov=security_utils
    --cov=state_machine
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80
markers =
    integration: safe integration-style tests for OS and service seams; no live automation.
    supervised: opt-in tests that require an operator, foreground game window, or hardware input environment.
